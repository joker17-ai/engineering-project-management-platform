<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蓝箭项目管理平台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="platform-shell">
      <aside class="rail">
        <div class="brand">
          <div class="brand-mark">LA</div>
          <div>
            <strong>蓝箭项目管理平台</strong>
            <span>公众工程项目协同台</span>
          </div>
        </div>
        <nav id="moduleNav" class="module-nav" aria-label="平台模块"></nav>
        <section class="github-box">
          <span>GitHub 数据仓库</span>
          <strong>engineering-project-management-platform</strong>
          <a href="https://github.com/joker17-ai/engineering-project-management-platform" target="_blank" rel="noreferrer">打开仓库</a>
        </section>
      </aside>

      <section class="project-panel">
        <div class="panel-title">
          <span>工程线位点二</span>
          <strong id="activeProjectName"></strong>
        </div>
        <div class="project-selectors">
          <label>
            <span>项目</span>
            <select id="projectSelect"></select>
          </label>
          <label>
            <span>标段</span>
            <select id="sectionSelect"></select>
          </label>
        </div>
        <div id="projectTree" class="project-tree"></div>
      </section>

      <section class="workspace">
        <header class="topbar">
          <div>
            <span class="eyebrow">Blue Arrow Public Project Console</span>
            <h1>蓝箭项目管理平台</h1>
            <p>以 GitHub 仓库为数据底座，围绕工程线位点二建立项目结构、资料归集、进度质量、风险闭环和公众公开看板。</p>
          </div>
          <div class="sync-card">
            <span>数据状态</span>
            <strong id="syncState">GitHub 已关联</strong>
            <small>本地演示数据会保存在浏览器，正式数据建议提交到仓库目录。</small>
          </div>
        </header>

        <section id="statsGrid" class="stats-grid" aria-label="项目指标"></section>

        <div class="tab-strip" id="tabStrip"></div>

        <section id="contentView" class="content-view"></section>
      </section>
    </main>

    <script type="module" src="./src/app.mjs"></script>
  </body>
</html>
