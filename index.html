<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>工程项目全过程监理与现场管理平台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section id="accessGate" class="access-gate" aria-label="项目管理者入口"></section>
    <main class="admin-shell">
      <aside class="module-rail" aria-label="一级功能栏目">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 32 32" role="img">
              <path d="M5 8.5h16l6 6v12H5z" />
              <path d="M21 8.5v6h6" />
              <path d="M9 14h7" />
              <path d="M9 19h14" />
              <path d="M9 23h10" />
              <path d="M20 3.5l5 5" />
              <path d="M18 5.5l5 5" />
            </svg>
          </span>
          <div>
            <strong>工程项目管理平台</strong>
          </div>
        </div>
        <nav id="moduleNav" class="module-nav"></nav>
      </aside>

      <section class="secondary-panel" aria-label="二级目录">
        <div class="secondary-project-controls">
          <label>
            <span>当前项目切换</span>
            <select id="projectSwitch" class="project-switch" aria-label="当前项目切换"></select>
          </label>
          <label>
            <span>当前标段</span>
            <select id="bidSectionSwitch" class="project-switch" aria-label="当前标段切换"></select>
          </label>
        </div>
        <div class="panel-heading">
          <span>二级目录</span>
          <strong id="secondaryCount">0 项</strong>
        </div>
        <div id="secondaryNav" class="project-tree"></div>
      </section>

      <section class="workspace" aria-label="管理工作台">
        <div id="statsGrid" class="stats-grid"></div>

        <div class="tab-strip" id="tabStrip" aria-label="业务视图切换"></div>

        <section id="contentView" class="content-view"></section>
      </section>

    </main>

    <script type="module" src="./src/app.mjs"></script>
  </body>
</html>
