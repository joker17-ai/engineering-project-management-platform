<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蓝箭项目管理平台</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=catalog-tabs-5" />
  </head>
  <body>
    <section id="accessGate" class="access-gate"></section>
    <main class="admin-shell" hidden>
      <aside class="module-rail">
        <div class="brand">
          <img src="./assets/blue-arrow-logo.jpg" alt="蓝箭项目标识" />
          <div>
            <strong>蓝箭项目管理平台</strong>
            <small>工程线位点二</small>
          </div>
        </div>
        <nav id="moduleNav" class="module-nav" aria-label="一级目录"></nav>
        <a class="github-link" href="https://github.com/joker17-ai/engineering-project-management-platform" target="_blank" rel="noreferrer">
          GitHub 数据仓库
        </a>
      </aside>

      <aside class="secondary-panel">
        <section class="project-controls">
          <label>
            <span>当前项目切换</span>
            <select id="projectSwitch"></select>
          </label>
          <label>
            <span>当前标段</span>
            <select id="sectionSwitch"></select>
          </label>
        </section>
        <section class="secondary-heading">
          <span>二级目录</span>
          <strong id="secondaryCount"></strong>
        </section>
        <nav id="secondaryNav" class="secondary-nav" aria-label="二级目录"></nav>
      </aside>

      <section class="workspace">
        <section id="adminIdentityBar" class="admin-identity-bar" aria-label="项目身份确认"></section>
        <section id="statsGrid" class="stats-grid" aria-label="项目指标"></section>
        <div id="tabStrip" class="tab-strip"></div>
        <section id="contentView" class="content-view"></section>
      </section>
    </main>
    <section id="apiModalHost"></section>

    <script type="module" src="./src/app.mjs?v=catalog-tabs-5"></script>
  </body>
</html>
